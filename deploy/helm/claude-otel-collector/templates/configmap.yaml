apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app: {{ .Release.Name }}
data:
  collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000
      claude:
        pricing:
          {{- range $model, $pricing := .Values.collectorConfig.pricing }}
          {{ $model }}:
            input_per_mtok: {{ $pricing.input_per_mtok }}
            output_per_mtok: {{ $pricing.output_per_mtok }}
          {{- end }}
        team_mapping:
          {{- range $user, $team := .Values.collectorConfig.teamMapping }}
          {{ $user }}: {{ $team }}
          {{- end }}
      contentfilter/dd:
        mode: strip

    exporters:
      datadog:
        api:
          key: ${DD_API_KEY}
          site: {{ .Values.collectorConfig.datadogSite }}

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
        path: /ping

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, claude, contentfilter/dd]
          exporters: [datadog]
        metrics:
          receivers: [otlp]
          processors: [batch, claude]
          exporters: [datadog]
