receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  claude:
    pricing:
      claude-sonnet-4-20250514:
        input_per_mtok: 3.00
        output_per_mtok: 15.00
    team_mapping:
      user-123: platform-team
  contentfilter/dd:
    mode: strip

exporters:
  debug:
    verbosity: detailed

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [claude, contentfilter/dd]
      exporters: [debug]
